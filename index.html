<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python Practice Test</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Python Certification Practice</h1>

<div id="quiz">

<!-- SEARCH BOX -->

<div class="search-box">

<input 
id="searchQuestion" 
type="number" 
placeholder="Go to question number..."
min="1">

<button onclick="goToQuestion()">Go</button>

</div>


<!-- QUESTION NUMBER -->

<div id="question-number"></div>


<!-- QUESTION TEXT -->

<div id="question"></div>


<!-- CODE BLOCK -->

<pre id="code"></pre>


<!-- ANSWERS -->

<div id="answers"></div>


<!-- FEEDBACK -->

<div id="feedback"></div>


<!-- CONTROLS -->

<div class="controls">

<button id="prevBtn" onclick="prevQuestion()">Previous</button>

<button onclick="nextQuestion()">Next</button>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
