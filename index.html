<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Python Certification Practice</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Python Certification Practice</h1>

<div id="quiz">

<div id="statusBar">
<div id="progress"></div>
</div>

<div id="scoreInfo">
Score: <span id="points">0</span> / 1000
</div>

<div id="questionStatus"></div>

<div class="search-box">
<input id="searchQuestion" type="number" placeholder="Go to question number">
<button onclick="goToQuestion()">Go</button>
</div>

<div id="question-number"></div>

<div id="question"></div>

<pre id="code"></pre>

<div id="answers"></div>

<div id="feedback"></div>

<div class="controls">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>

</div>

<script src="script.js"></script>

</body>

</html>
